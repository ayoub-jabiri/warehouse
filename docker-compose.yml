version: '5.1.4'
services:
  nextjs:
    build: .
    command: npm run dev
    ports:
      - target: 3000
        published: 3000
    env_file:
      .env.local
  mongo:
    image: mongo:latest
    ports:
      - target: 27017
        published: 27017
    volumes:
      - warehouse:/data/db
volumes:
  warehouse: